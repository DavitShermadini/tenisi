<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ტენისი</title>
<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ტენისი">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }
  canvas { display: block; background: #000; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; color: #fff; text-align: center;
    background: rgba(0,0,0,0.55);
    transition: opacity .2s;
  }
  #overlay h1 { font-size: 26px; font-weight: 600; letter-spacing: .5px; }
  #overlay p  { font-size: 15px; opacity: .7; max-width: 300px; line-height: 1.5; }
  #overlay button {
    margin-top: 6px; padding: 12px 30px; font-size: 17px;
    background: #fff; color: #000; border: none; border-radius: 30px;
    cursor: pointer; font-weight: 600;
  }
  #overlay button:active { transform: scale(.96); }
  #overlay button.ghost {
    background: transparent; color: #fff;
    border: 1px solid rgba(255,255,255,0.5); margin-top: 0;
    padding: 10px 24px; font-size: 15px;
  }
  #grid {
    font-size: 22px; letter-spacing: 3px; line-height: 1.35;
    max-width: 280px; word-break: break-all;
  }
  #grid:empty { display: none; }
  .hidden { display: none !important; }
  /* რეჟიმის/მხარის segmented ღილაკები */
  .seg-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .seg-label { color: rgba(255,255,255,0.6); font-size: 14px; }
  .seg {
    padding: 9px 16px; font-size: 14px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 22px;
    cursor: pointer; transition: background .15s, border-color .15s;
  }
  .seg:active { transform: scale(.96); }
  .seg.on { background: #fff; color: #000; border-color: #fff; }
  .rec { color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 2px; }
  .rec:empty { display: none; }
  .skin-seg[data-skin="neon"]   { border-color: #39f6ff; }
  .skin-seg[data-skin="gold"]   { border-color: #ffd54a; }
  .skin-seg[data-skin="matrix"] { border-color: #7dff5a; }

  /* პროფილის პანელი */
  .panel {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); padding: 16px;
  }
  .panel-card {
    position: relative; width: 100%; max-width: 340px;
    background: #111; border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px; padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    max-height: 92vh; overflow-y: auto;
  }
  .panel-card .x {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: rgba(255,255,255,0.6);
    font-size: 18px; cursor: pointer; padding: 4px;
  }
  .avatar-wrap { position: relative; width: 96px; height: 96px; }
  #avatarImg {
    width: 96px; height: 96px; border-radius: 50%;
    object-fit: cover; background: #222;
    border: 2px solid rgba(255,255,255,0.25);
  }
  #avatarBtn {
    position: absolute; bottom: -2px; right: -2px;
    width: 30px; height: 30px; border-radius: 50%;
    background: #fff; color: #000; border: none; cursor: pointer; font-size: 14px;
  }
  #nameInput {
    width: 100%; text-align: center; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px;
  }
  #nameInput:focus { outline: none; border-color: rgba(255,255,255,0.5); }
  .stats { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; text-align: center; }
  .stat b { display: block; font-size: 22px; color: #fff; }
  .stat span { font-size: 11px; color: rgba(255,255,255,0.55); }
  .panel-card .hint { font-size: 11px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.4; }
  .panel-title { font-size: 18px; color: #fff; font-weight: 600; }
  .panel-card .big { padding: 14px 28px; font-size: 16px; background:#fff; color:#000; border:none; border-radius: 26px; cursor:pointer; font-weight:600; width:100%; }
  .or { color: rgba(255,255,255,0.4); font-size: 13px; margin: 4px 0; }
  .join-row { display:flex; gap:8px; width:100%; }
  #joinCode {
    flex:1; text-align:center; text-transform:uppercase; letter-spacing:2px; font-size:16px; font-weight:600;
    background: rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:10px;
  }
  #joinCode:focus { outline:none; border-color: rgba(255,255,255,0.5); }
  .join-row button { padding:0 18px; font-size:14px; font-weight:600; background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:12px; cursor:pointer; }
  .room-code { font-size: 34px; font-weight: 800; letter-spacing: 6px; color:#fff; background:rgba(255,255,255,0.08); border-radius:12px; padding:12px 8px; margin:8px 0; }
  .lobby-msg { font-size: 13px; color: rgba(255,255,255,0.7); }
  .lobby-status { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .lobby-err { font-size: 12px; color: #ff6b6b; min-height: 1px; text-align:center; }
  #lobbyHome, #lobbyWait { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
  #soundBtn {
    position: absolute; top: 14px; right: 14px; z-index: 5;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.12); color: #fff;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 20px;
    cursor: pointer; backdrop-filter: blur(2px);
  }
  #soundBtn:active { transform: scale(.95); }
  #musicBtn {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    padding: 8px 12px; font-size: 15px;
    background: rgba(255,255,255,0.12); color: #fff;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 20px;
    cursor: pointer; backdrop-filter: blur(2px);
  }
  #musicBtn:active { transform: scale(.95); }

  /* landscape (დაბალი სიმაღლე) — ტექსტი/ღილაკები კომპაქტურად, რომ ჩაეტიოს */
  #overlay { overflow-y: auto; padding: 10px; }
  @media (orientation: landscape) and (max-height: 520px) {
    #overlay { gap: 8px; }
    #overlay h1 { font-size: 19px; letter-spacing: .3px; }
    #overlay p  { font-size: 12.5px; max-width: 78vw; line-height: 1.35; }
    #overlay button { margin-top: 2px; padding: 8px 22px; font-size: 15px; }
    #overlay button.ghost { padding: 6px 16px; font-size: 12.5px; }
    #grid { font-size: 16px; letter-spacing: 2px; line-height: 1.15; max-width: 80vw; }
    #musicBtn, #soundBtn { top: 8px; padding: 5px 10px; font-size: 12px; }
    #musicBtn { left: 8px; } #soundBtn { right: 8px; }
    .seg { padding: 6px 12px; font-size: 12.5px; }
    .seg-label { font-size: 12px; }
    .rec { font-size: 11px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <button id="musicBtn" title="ფონური მუსიკა">🎵</button>
  <button id="soundBtn" title="ხმის გადართვა">🔊 რეტრო</button>
  <div id="overlay">
    <h1>ტ ე ნ ი ს ი</h1>
    <p id="subtitle"></p>
    <div id="modeRow" class="seg-row">
      <button class="seg" data-mode="cpu">🤖 კომპიუტერთან</button>
      <button class="seg" data-mode="duo">✋🤚 ორი ხელით</button>
    </div>
    <div id="sideRow" class="seg-row">
      <span class="seg-label">შენი მხარე:</span>
      <button class="seg" data-side="bottom">⬇️ ქვედა</button>
      <button class="seg" data-side="top">⬆️ ზედა</button>
    </div>
    <div id="diffRow" class="seg-row">
      <span class="seg-label">სირთულე:</span>
      <button class="seg" data-diff="easy">მარტივი</button>
      <button class="seg" data-diff="medium">საშუალო</button>
      <button class="seg" data-diff="hard">ძნელი</button>
    </div>
    <div id="skinRow" class="seg-row">
      <span class="seg-label">სტილი:</span>
      <button class="seg skin-seg" data-skin="classic">კლასიკური</button>
      <button class="seg skin-seg" data-skin="neon">ნეონი</button>
      <button class="seg skin-seg" data-skin="gold">ოქრო</button>
      <button class="seg skin-seg" data-skin="matrix">მატრიცა</button>
    </div>
    <div id="grid"></div>
    <button id="startBtn">დაწყება</button>
    <button id="shareBtn" class="ghost hidden">📤 შედეგის გაზიარება</button>
    <button id="onlineBtn" class="ghost">🌐 მეგობართან ონლაინ (beta)</button>
    <button id="profileBtn" class="ghost">👤 პროფილი & რეკორდები</button>
    <p id="recLine" class="rec"></p>
  </div>

  <!-- ონლაინ ლობი -->
  <div id="lobby" class="panel hidden">
    <div class="panel-card">
      <button id="lobbyClose" class="x">✕</button>
      <h2 class="panel-title">🌐 მეგობართან ონლაინ</h2>
      <div id="lobbyHome">
        <button id="createRoomBtn" class="big">ოთახის შექმნა</button>
        <div class="or">— ან —</div>
        <div class="join-row">
          <input id="joinCode" maxlength="8" placeholder="ოთახის კოდი" autocomplete="off">
          <button id="joinRoomBtn">შეერთება</button>
        </div>
      </div>
      <div id="lobbyWait" class="hidden">
        <p class="lobby-msg">გაუზიარე მეგობარს კოდი:</p>
        <div id="roomCode" class="room-code"></div>
        <button id="copyCodeBtn" class="ghost">📋 კოდის კოპირება</button>
        <p class="lobby-status" id="lobbyStatus">⏳ ველოდები მეგობარს…</p>
      </div>
      <p id="lobbyErr" class="lobby-err"></p>
    </div>
  </div>

  <!-- პროფილის / რეკორდების პანელი -->
  <div id="profile" class="panel hidden">
    <div class="panel-card">
      <button id="profileClose" class="x">✕</button>
      <div class="avatar-wrap">
        <img id="avatarImg" alt="avatar">
        <button id="avatarBtn" title="ფოტოს დაყენება">📷</button>
        <input id="avatarFile" type="file" accept="image/*" hidden>
      </div>
      <input id="nameInput" maxlength="20" placeholder="შენი სახელი">
      <div id="statsBox" class="stats"></div>
      <p class="hint">🔒 პროფილი ლოკალურად ინახება. Google-ით შესვლა და გლობალური რეიტინგები მალე დაემატება.</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// ---- ლოგიკური ზომები (ვირტუალური კოორდინატები) ----
// ვთამაშობთ 600x900 ველზე, შემდეგ ვამასშტაბებთ ეკრანზე.
const W = 600, H = 900;
let scale = 1;
let fieldRotation = 0; // 0 = portrait; 90 = landscape (ველი გადატრიალებული, რომ ადგილზე დარჩეს)

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const landscape = vw > vh;
  fieldRotation = landscape ? 90 : 0;
  // landscape-ში ველი 90°-ით ტრიალდება, ამიტომ მასშტაბს გაცვლილ განზომილებებზე ვითვლით
  // → ველი ზუსტად იმავე ზომაზე რჩება, როგორც portrait-ში
  scale = landscape ? Math.min(vw / H, vh / W) : Math.min(vw / W, vh / H);
  const cw = W * scale, ch = H * scale;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.style.transform = landscape ? 'rotate(90deg)' : 'none';
  canvas.width = Math.round(cw * devicePixelRatio);
  canvas.height = Math.round(ch * devicePixelRatio);
  ctx.setTransform(devicePixelRatio * scale, 0, 0, devicePixelRatio * scale, 0, 0);
}
window.addEventListener('resize', resize);
// ტელეფონის გადატრიალება — ზოგი ბრაუზერი მალევე ძველ ზომას აბრუნებს, ამიტომ ვიმეორებთ
window.addEventListener('orientationchange', () => { resize(); setTimeout(resize, 250); });
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// ---- თამაშის ობიექტები ----
const PADDLE_W = W / 5;      // რაკეტის სიგრძე ≈ ეკრანის მეხუთედი
const PADDLE_H = 14;
const PADDLE_MARGIN = 40;    // მანძილი კიდიდან
const BALL = 16;             // კვადრატის გვერდი
const WIN_SCORE = 7;

const pBottom = { x: W/2 - PADDLE_W/2, y: H - PADDLE_MARGIN, target: W/2 - PADDLE_W/2 }; // ქვედა რაკეტი
const pTop    = { x: W/2 - PADDLE_W/2, y: PADDLE_MARGIN,     target: W/2 - PADDLE_W/2 }; // ზედა რაკეტი

let ball = { x: W/2, y: H/2, vx: 0, vy: 0, speed: 0 };
let scoreP = 0, scoreA = 0; // scoreP = ქვედა მხარის ქულა, scoreA = ზედა მხარის ქულა
let running = false;

// ---- რეჟიმი და მხარე ----
let mode = localStorage.getItem('mode') || 'cpu';               // 'cpu' (კომპიუტერთან) | 'duo' (ორი ხელით)
let playerSide = localStorage.getItem('playerSide') || 'bottom'; // cpu-ში რომელ რაკეტს მართავ: 'bottom' | 'top'
let aiLevel = localStorage.getItem('aiLevel') || 'medium';      // 'easy' | 'medium' | 'hard'
let skin = localStorage.getItem('skin') || 'classic';
const SKINS = {
  classic: { paddle: '#ffffff', ball: '#ffffff', heat: true,  sw: '#ffffff' }, // heat: თეთრი→ცხელი
  neon:    { paddle: '#39f6ff', ball: '#ff3df0', heat: false, sw: '#ff3df0' },
  gold:    { paddle: '#ffd54a', ball: '#ffb300', heat: false, sw: '#ffb300' },
  matrix:  { paddle: '#7dff5a', ball: '#00ff66', heat: false, sw: '#00ff66' },
};
const AI_PRESET = {
  easy:   { speed: 5.0,  follow: 0.08, passive: 0.20, err: 55 },
  medium: { speed: 7.5,  follow: 0.12, passive: 0.35, err: 24 },
  hard:   { speed: 12.0, follow: 0.22, passive: 0.55, err: 6 },
};
const pointerAssign = {}; // pointerId -> რომელ რაკეტს მართავს ეს თითი (multi-touch)
let online = null;        // ონლაინ სესია: { role, peer, conn, connected, ... } ან null

// დამხმარეები: ვინ არის მოთამაშე/AI cpu რეჟიმში
function humanPaddle() { return playerSide === 'bottom' ? pBottom : pTop; }
function aiPaddle()    { return playerSide === 'bottom' ? pTop : pBottom; }

// ---- Rally + juice state ----
let rally = 0;        // მიმდინარე გაცვლის სიგრძე (რამდენჯერ დაარტყეს ცდომის გარეშე)
let bestRally = 0;    // მატჩის საუკეთესო გაცვლა
let pointLog = [];    // 'P'/'A' თითო ქულაზე — გასაზიარებელი emoji-ბადისთვის
let trail = [];       // ბურთის კვალი (motion trail)
let shake = 0;        // ეკრანის შერყევის სიძლიერე
let countdownUntil = 0; // სტარტის ათვლის დასრულების დრო (ms)
let lastTick = -1;      // ბოლო ნაჩვენები ციფრი (tick-ხმისთვის)

// ვიბრაცია (მობილურზე)
let hapticsOn = localStorage.getItem('haptics') !== 'off';
function vibrate(pattern) {
  if (hapticsOn && navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
}
function startCountdown(first) {
  countdownUntil = performance.now() + (first ? 2600 : 900);
  lastTick = -1;
}
let hitStop = 0;      // მიკრო-პაუზა დარტყმაზე (ხდის დარტყმას "წონიანს")
let rallyPop = 0;     // rally-მთვლელის პულსაცია

const BASE_SPEED = 6;
const MAX_SPEED = 18;
const SPEED_STEP = 0.5;  // ყოველ დარტყმაზე აჩქარება

// ---- ხმა: «Электроника Видеоспорт»-ის სტილის square-wave ბიპები ----
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
// მარტივი პიეზო-ტონი: კვადრატული ტალღა, მოკლე ხანგრძლივობა
function beep(freq, dur, vol) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol || 0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur); // მკვეთრი ჩაქრობა
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}
// ხმაურის მოკლე ბუფერი (ტრანზიენტისთვის) — ერთხელ იქმნება
let noiseBuf = null;
function getNoise() {
  if (!noiseBuf) {
    const len = Math.floor(audioCtx.sampleRate * 0.15);
    noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  return noiseBuf;
}

// რეალისტური "ტკაცუნი": ხმაურის იმპულსი ბენდპას ფილტრში (clack) + ხის ტონი (body)
function knock(freq, dur, vol) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // 1) მკვეთრი ტრანზიენტი — ფილტრირებული ხმაური
  const src = audioCtx.createBufferSource();
  src.buffer = getNoise();
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = freq * 2.2; // ტკაცუნი მაღალ სიხშირეზეა
  bp.Q.value = 1.2;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime((vol || 0.4) * 1.1, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.6); // ძალიან სწრაფი ჩაქრობა
  src.connect(bp).connect(ng).connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);

  // 2) ხის სხეული — მოკლე ტონი ვარდნით
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + dur);
  og.gain.setValueAtTime((vol || 0.4) * 0.6, t);
  og.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(og).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

// ================= ფონური მუსიკა (chiptune sequencer) =================
// ნოტების სიხშირეები (თანაბარტემპერირებული, Hz). 'R' = პაუზა.
const FREQ = {
  'D3':146.83,'E3':164.81,'F#3':185.00,'G3':196.00,
  'A3':220.00,'A#3':233.08,'B3':246.94,
  'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,
  'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
  'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,
  'R':0,
};

const BPM = 104;                 // მარშული ტემპი
const BEAT = 60 / BPM;           // ერთი დარტყმის ხანგრძლივობა წამებში

// «ბრძოლის ყიჟინა მოგვესმა» — არანჟირება მომხმარებლის აკორდების მიხედვით.
// ფორმატი: ['ნოტა', ხანგრძლივობა beats-ში]. თითო კომენტარი = ლირიკის ერთი ხაზი (აკორდით).
// მოდი: A მიქსოლიდიური (G-ბუნებრივი), აკორდები power-ად (მარშული ჟღერადობა).

// მელოდია (LEAD) — ზედა ხმა, აკორდის ტონებზე
const LEAD = [
  // 1. [A] ბრძოლის ყიჟინა მოგვესმა
  ['E4',0.5],['E4',0.5],['A4',0.5],['A4',0.5],['B4',0.5],['A4',0.5],['F#4',1],
  // 2. [A] ბრძოლის ყიჟინა მოგვესმა
  ['E4',0.5],['E4',0.5],['A4',0.5],['A4',0.5],['C#5',0.5],['B4',0.5],['A4',1],
  // 3. [E] მშობლიურ მთების ძახილი
  ['B4',0.5],['B4',0.5],['B4',0.5],['A4',0.5],['G4',0.5],['A4',0.5],['B4',1],
  // 4. [E→F#→G] ეჰეე ჰეე (აღმავალი შეძახილი)
  ['E4',1],['F#4',1],['G4',1.5],['R',0.5],
  // 5. [D] ბრძოლის ყიჟინა მოგვესმა
  ['A4',0.5],['A4',0.5],['A4',0.5],['F#4',0.5],['D4',0.5],['F#4',0.5],['A4',1],
  // 6. [A] ტანზე ავისხით აბჯარი
  ['E4',0.5],['E4',0.5],['A4',0.5],['A4',0.5],['B4',0.5],['A4',0.5],['F#4',1],
  // 7. [E] წელზე შევიბით მახვილი
  ['B4',0.5],['B4',0.5],['A4',0.5],['G4',0.5],['F#4',0.5],['G4',0.5],['E4',1],
  // 8. [E→F#→G] ეჰეე ჰეე
  ['E4',1],['F#4',1],['G4',1.5],['R',0.5],
  // 9. [D] ბრძოლის ყიჟინა მოგვესმა
  ['A4',0.5],['A4',0.5],['A4',0.5],['F#4',0.5],['D4',0.5],['F#4',0.5],['A4',1],
  // 10. [A] ტანზე ავისხით აბჯარი
  ['E4',0.5],['E4',0.5],['A4',0.5],['A4',0.5],['C#5',0.5],['B4',0.5],['A4',1],
  // 11. [E] წელზე შევიბით მახვილი
  ['B4',0.5],['B4',0.5],['A4',0.5],['G4',0.5],['F#4',0.5],['E4',0.5],['E4',1],
  // 12. [E→A] ეეე (გადაწყვეტა ტონიკაზე)
  ['E4',0.5],['D4',0.5],['C#4',1],['B3',0.5],['A3',0.5],['A3',1],
];

// ბასი (BASS) — აკორდების საფუძვლები, დაბალ ოქტავაში
const BASS = [
  ['A3',2],['A3',2],   // 1. A
  ['A3',2],['A3',2],   // 2. A
  ['E3',2],['E3',2],   // 3. E
  ['E3',1],['F#3',1],['G3',2], // 4. E→F#→G
  ['D3',2],['D3',2],   // 5. D
  ['A3',2],['A3',2],   // 6. A
  ['E3',2],['E3',2],   // 7. E
  ['E3',1],['F#3',1],['G3',2], // 8. E→F#→G
  ['D3',2],['D3',2],   // 9. D
  ['A3',2],['A3',2],   // 10. A
  ['E3',2],['E3',2],   // 11. E
  ['E3',2],['A3',2],   // 12. E→A (კადენცია)
];

let musicOn = localStorage.getItem('musicOn') !== 'off'; // ნაგულისხმევად ჩართული
let musicPlaying = false;
let schedulerId = null;
const activeOscs = [];

// ერთი ნოტა — square-wave მოკლე გარსით (chiptune)
function playNote(freq, start, dur, vol) {
  if (!audioCtx || freq <= 0) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(freq, start);
  const v = vol || 0.06;
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(v, start + 0.012);       // მოკლე attack
  g.gain.setValueAtTime(v, start + dur * 0.7);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.98); // decay
  o.connect(g).connect(audioCtx.destination);
  o.start(start);
  o.stop(start + dur);
  activeOscs.push(o);
  o.onended = () => { const i = activeOscs.indexOf(o); if (i >= 0) activeOscs.splice(i, 1); };
}

// ერთი ხმის (track) დაგეგმვა startTime-იდან; აბრუნებს ხანგრძლივობას
function scheduleTrack(track, startTime, vol, staccato) {
  let t = startTime;
  for (const [note, beats] of track) {
    const dur = beats * BEAT;
    playNote(FREQ[note] || 0, t, dur * (staccato || 0.92), vol);
    t += dur;
  }
  return t - startTime;
}

// მთელი სიმღერის ერთი გავლა (ბასი + მელოდია ერთდროულად)
function scheduleSong(startTime) {
  const dur = scheduleTrack(LEAD, startTime, 0.07, 0.9);  // მელოდია ოდნავ ხმამაღლა
  scheduleTrack(BASS, startTime, 0.05, 0.95);             // ბასი ჩუმად, ოდნავ გრძელი
  return dur;
}

function startMusic() {
  if (!audioCtx || musicPlaying || !musicOn) return;
  musicPlaying = true;
  const loop = () => {
    if (!musicPlaying) return;
    const dur = scheduleSong(audioCtx.currentTime + 0.08);
    schedulerId = setTimeout(loop, dur * 1000 - 60); // gapless loop
  };
  loop();
}

function stopMusic() {
  musicPlaying = false;
  if (schedulerId) { clearTimeout(schedulerId); schedulerId = null; }
  activeOscs.forEach(o => { try { o.stop(); } catch (e) {} });
  activeOscs.length = 0;
}

function resetBall(dir, first) {
  ball.x = W/2; ball.y = H/2;
  ball.speed = BASE_SPEED;
  rally = 0;      // ახალ გაცვლას ვიწყებთ ნულიდან
  trail = [];
  reaimAI();      // AI-ს მიზნის შეცდომა ახლდება (დონის მიხედვით)
  startCountdown(first); // 3-2-1 სანამ ბურთი დაიძვრება
  // რენდომული კუთხე, მაგრამ ძირითადად ვერტიკალური
  const angle = (Math.random() * 0.6 - 0.3); // -0.3..0.3 რადიანი გვერდულობა
  ball.vx = Math.sin(angle) * ball.speed;
  ball.vy = Math.cos(angle) * ball.speed * (dir || (Math.random() < 0.5 ? 1 : -1));
}

  initAudio(); // მომხმარებლის ჟესტზე ვრთავთ აუდიოს

}

function buildGrid() {
  // მოთამაშის პერსპექტივიდან: მისი ქულა 🟩, მოწინააღმდეგის ⬛
  return pointLog.map(p => p === 'P' ? '🟩' : '⬛').join('');
}

function endGame(msg) {
  running = false;
  // ანგარიში „შენი" პერსპექტივიდან (duo-ში ქვედა:ზედა)
  const you = (mode === 'duo' || playerSide === 'bottom') ? scoreP : scoreA;
  const opp = (mode === 'duo' || playerSide === 'bottom') ? scoreA : scoreP;
  const won = you > opp;
  const grid = buildGrid();
  gridEl.textContent = grid;

  // პირადი რეკორდი — ყველაზე გრძელი გაცვლა (ლოკალურად)
  const rec = Math.max(bestRally, +(localStorage.getItem('bestRallyEver') || 0));
  localStorage.setItem('bestRallyEver', rec);
  recordResult(won); // სტატისტიკა (თამაშები, მოგება, სერია)

  overlay.querySelector('h1').textContent = msg;
  overlay.querySelector('#subtitle').textContent =
    `ანგარიში ${you} : ${opp}  •  🔥 საუკეთესო გაცვლა: ${bestRally}`;
  startBtn.textContent = '↻ კიდევ ერთხელ';
  shareBtn.classList.remove('hidden');
  updateRecLine();

  // გასაზიარებელი ტექსტი (Wordle-ის სტილში)
  const tag = mode === 'duo' ? 'ორი ხელით' : (won ? '🏆' : '❌');
  lastResult =
    `🏓 ტენისი — ${you}:${opp} ${tag}\n` +
    `${grid}\n` +
    `🔥 საუკეთესო გაცვლა: ${bestRally}\n` +
    location.href;

  overlay.classList.remove('hidden');
  startMusic(); // მენიუ დაბრუნდა — ფონური მუსიკა განახლდება
}

function getProfile() { try { return JSON.parse(localStorage.getItem('profile')) || {}; } catch (e) { return {}; } }

// endGame-იდან: სტატისტიკის განახლება
function recordResult(youWon) {
  const s = getStats();
  s.longestRally = Math.max(s.longestRally || 0, bestRally);
  if (mode === 'cpu' && !online) { // მოგება/სერია მხოლოდ კომპიუტერთან ითვლება
    s.games = (s.games || 0) + 1;
    if (youWon) { s.wins = (s.wins || 0) + 1; s.streak = (s.streak || 0) + 1; s.bestStreak = Math.max(s.bestStreak || 0, s.streak); }
    else { s.losses = (s.losses || 0) + 1; s.streak = 0; }
  }
  saveStats(s);
}

  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      // 256px-მდე ცენტრში ჩამოჭრა/შემცირება, რომ localStorage-ში ჩაეტიოს
      const size = 256, c = document.createElement('canvas'); c.width = c.height = size;
      const cx = c.getContext('2d');
      const s = Math.min(img.width, img.height);
      cx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, size, size);
      const data = c.toDataURL('image/jpeg', 0.85);
      const p = getProfile(); p.avatar = data; saveProfile(p);
      avatarImg.src = data;
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(f);
});

      setTimeout(() => shareBtn.textContent = '📤 შედეგის გაზიარება', 1600);
    }
  } catch (e) { /* მომხმარებელმა გააუქმა — ვჩუმდებით */ }
});

// ---- მართვა: მაუსი / შეხება (multi-touch) ----
// პოინტერიდან ველის კოორდინატები — canvas-ის ცენტრის მიმართ, ორიენტაციის გათვალისწინებით
function pointerToField(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const dx = clientX - (rect.left + rect.width / 2);
  const dy = clientY - (rect.top + rect.height / 2);
  let lx, ly;
  if (fieldRotation === 90) { lx = dy; ly = -dx; } // landscape: ეკრანის ღერძები გაცვლილია
  else { lx = dx; ly = dy; }
  return { x: W / 2 + lx / scale, y: H / 2 + ly / scale };
}
// რომელ რაკეტს ეკუთვნის ეს შეხება
function pickPaddle(f) {
  if (online) return online.role === 'host' ? pBottom : pTop; // ონლაინ: შენს რაკეტს მართავ
  if (mode === 'cpu') return humanPaddle();
  return f.y < H / 2 ? pTop : pBottom; // duo: ზედა ნახევარი → ზედა, ქვედა → ქვედა
}
function setPaddleTarget(p, fx) {
  p.target = Math.max(0, Math.min(W - PADDLE_W, fx - PADDLE_W / 2));
}
window.addEventListener('pointerdown', e => {
  if (!running) return;
  const f = pointerToField(e.clientX, e.clientY);
  const p = pickPaddle(f);
  pointerAssign[e.pointerId] = p;
  setPaddleTarget(p, f.x);
});
window.addEventListener('pointermove', e => {
  if (!running) return;
  let p = pointerAssign[e.pointerId];
  if (!p) { if (!(e.buttons || e.pointerType === 'touch')) return; p = pickPaddle(pointerToField(e.clientX, e.clientY)); }
  setPaddleTarget(p, pointerToField(e.clientX, e.clientY).x);
});
window.addEventListener('pointerup',     e => { delete pointerAssign[e.pointerId]; });
window.addEventListener('pointercancel', e => { delete pointerAssign[e.pointerId]; });
// კლავიატურა (დესკტოპისთვის)
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup',   e => keys[e.key] = false);

// ---- AI ----
function updateAI(p) {
  const cfg = AI_PRESET[aiLevel] || AI_PRESET.medium;
  const center = p.x + PADDLE_W/2;
  // err — მიზანში მცირე „შეცდომა", რომ სხვადასხვა დონე იგრძნობოდეს
  const diff = (ball.x + (p._aim || 0)) - center;
  const toward = (p === pTop) ? ball.vy < 0 : ball.vy > 0;
  const react = toward ? 1 : cfg.passive;
  p.x += Math.max(-cfg.speed, Math.min(cfg.speed, diff * cfg.follow * react));
  p.x = Math.max(0, Math.min(W - PADDLE_W, p.x));
  p.target = p.x; // lerp არ ჩაერიოს
}
// AI-ს „მიზნის შეცდომა" ახლდება ყოველ დარტყმაზე (დონის მიხედვით)
function reaimAI() {
  const cfg = AI_PRESET[aiLevel] || AI_PRESET.medium;
  pTop._aim = (Math.random() * 2 - 1) * cfg.err;
  pBottom._aim = (Math.random() * 2 - 1) * cfg.err;
}

// ---- ფიზიკა ----
function update() {
  // კლავიატურა (დესკტოპი): cpu-ში მოთამაშის რაკეტი; duo-ში ←/→ ქვედა, A/D ზედა
  const kb = (mode === 'cpu') ? humanPaddle() : pBottom;
  if (keys['ArrowLeft'])  kb.target -= 9;
  if (keys['ArrowRight']) kb.target += 9;
  if (mode === 'duo') {
    if (keys['a'] || keys['A']) pTop.target -= 9;
    if (keys['d'] || keys['D']) pTop.target += 9;
  }

  // AI მხოლოდ cpu რეჟიმში (ონლაინში არა)
  if (mode === 'cpu' && !online) updateAI(aiPaddle());

  // ორივე რაკეტის გლუვი მოძრაობა target-ისკენ
  pBottom.target = Math.max(0, Math.min(W - PADDLE_W, pBottom.target));
  pTop.target    = Math.max(0, Math.min(W - PADDLE_W, pTop.target));
  pBottom.x += (pBottom.target - pBottom.x) * 0.35;
  pTop.x    += (pTop.target - pTop.x) * 0.35;

  // ეფექტების ჩაქრობა
  shake *= 0.85;
  if (rallyPop > 0) rallyPop -= 0.08;

  // სტარტის ათვლა — ბურთი გაყინულია, სანამ 3-2-1 გავა (რაკეტები მაინც მოძრაობს)
  const now = performance.now();
  if (now < countdownUntil) {
    const rem = countdownUntil - now;
    const num = rem > 1733 ? 3 : rem > 866 ? 2 : 1;
    if (num !== lastTick) { lastTick = num; if (audioCtx) beep(520, 0.05, 0.12); vibrate(15); }
    return; // ბურთი არ მოძრაობს
  } else if (lastTick > 0) {
    lastTick = 0; if (audioCtx) beep(880, 0.09, 0.16); vibrate(30); // GO!
  }

  // მიკრო-პაუზა დარტყმის შემდეგ — ბურთი მოკლედ იყინება
  if (hitStop > 0) { hitStop--; return; }

  ball.x += ball.vx;
  ball.y += ball.vy;

  // ბურთის კვალი
  trail.push({ x: ball.x, y: ball.y });
  if (trail.length > 14) trail.shift();

  // გვერდითი კედლები
  if (ball.x < BALL/2) { ball.x = BALL/2; ball.vx *= -1; sfx.wall(); }
  if (ball.x > W - BALL/2) { ball.x = W - BALL/2; ball.vx *= -1; sfx.wall(); }

  // ქვედა რაკეტთან შეჯახება
  if (ball.vy > 0 && ball.y + BALL/2 >= pBottom.y - PADDLE_H/2 &&
      ball.y < pBottom.y &&
      ball.x > pBottom.x - BALL/2 && ball.x < pBottom.x + PADDLE_W + BALL/2) {
    bounce(pBottom);
  }
  // ზედა რაკეტთან შეჯახება
  if (ball.vy < 0 && ball.y - BALL/2 <= pTop.y + PADDLE_H/2 &&
      ball.y > pTop.y &&
      ball.x > pTop.x - BALL/2 && ball.x < pTop.x + PADDLE_W + BALL/2) {
    bounce(pTop);
  }

  // ქულა (ball.y < 0 → ზედა რაკეტმა გააცდინა → ქვედა მხარეს ემატება)
  if (ball.y < -BALL)   { scoreP++; logPoint('bottom'); shake = 12; sfx.score(); vibrate([25,40,25]); check(1); }
  if (ball.y > H + BALL) { scoreA++; logPoint('top');    shake = 12; sfx.score(); vibrate([25,40,25]); check(-1); }
}

// ქულის ჩაწერა emoji-ბადეში „შენი" პერსპექტივიდან (duo-ში — ქვედას პერსპექტივა)
function logPoint(sideScored) {
  const yours = (mode === 'duo') ? (sideScored === 'bottom') : (sideScored === playerSide);
  pointLog.push(yours ? 'P' : 'A');
}

function bounce(p) {
  // დარტყმის წერტილის მიხედვით კუთხის გამოთვლა
  const hit = (ball.x - (p.x + PADDLE_W/2)) / (PADDLE_W/2); // -1..1
  ball.speed = Math.min(MAX_SPEED, ball.speed + SPEED_STEP);
  const dir = (p.y > H/2) ? -1 : 1; // ქვედა რაკეტი -> ზემოთ, ზედა -> ქვემოთ
  const angle = hit * 0.9; // მაქს. კუთხე
  ball.vx = Math.sin(angle) * ball.speed;
  ball.vy = dir * Math.cos(angle) * ball.speed;
  ball.y += dir * 4; // რომ არ ჩარჩეს

  rally++;                              // გაცვლა გაიზარდა
  if (rally > bestRally) bestRally = rally;
  rallyPop = 1;                         // მთვლელის პულსი
  sfx.paddle();                         // ტონი rally-ს მიხედვით მაღლდება
  vibrate(8);                           // მსუბუქი დარტყმა
  shake = Math.min(14, 4 + ball.speed * 0.5); // შერყევა სიჩქარეზე
  hitStop = 2;                          // მიკრო-პაუზა
}

function check(dir) {
  if (scoreP >= WIN_SCORE || scoreA >= WIN_SCORE) {
    let msg;
    if (mode === 'duo') {
      msg = scoreP > scoreA ? '⬇️ ქვედა მოიგო! 🏆' : '⬆️ ზედა მოიგო! 🏆';
    } else {
      const you = playerSide === 'bottom' ? scoreP : scoreA;
      const opp = playerSide === 'bottom' ? scoreA : scoreP;
      msg = you > opp ? 'შენ მოიგე! 🏆' : 'წააგე';
    }
    endGame(msg);
    return;
  }
  resetBall(dir);
}

// ---- დახატვა ----
// rally-ს მიხედვით "სითბო": 0 = თეთრი, მაღალი = ცხელი ნარინჯისფერი/წითელი
function heatColor(alpha) {
  const h = Math.min(rally / 20, 1); // 0..1
  return `rgba(255,${Math.round(255 - h * 140)},${Math.round(255 - h * 235)},${alpha})`;
}
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
// აქცენტ-ფერი (ბურთი/კვალი/ნათება) — skin-ის მიხედვით
function accent(alpha) {
  const s = SKINS[skin] || SKINS.classic;
  return s.heat ? heatColor(alpha) : hexA(s.ball, alpha);
}
function paddleCol() { return (SKINS[skin] || SKINS.classic).paddle; }

// ცენტრალური დიდი ციფრი — duo-ში ორივე ნახევარში (ზედა 180°)
function drawCenterNumber(text, fontPx, fill) {
  const one = (yc, rot) => {
    ctx.save();
    ctx.translate(W/2, yc); ctx.rotate(rot);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = fill; ctx.font = `800 ${fontPx}px sans-serif`;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  };
  if (mode === 'duo') { one(H * 0.72, 0); one(H * 0.28, Math.PI); }
  else one(H / 2, 0);
}

function draw() {
  ctx.save();
  if (shake > 0.3) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  ctx.fillStyle = '#000';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // rally-ს მიხედვით მოედანი "თბება"
  const glow = Math.min(rally / 24, 1);
  if (glow > 0.01) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, accent(0.10 * glow));
    g.addColorStop(0.5, 'rgba(0,0,0,0)');
    g.addColorStop(1, accent(0.10 * glow));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // შუა ჰორიზონტალური ხაზი (წყვეტილი)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2; ctx.setLineDash([12, 14]);
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.setLineDash([]);

  // სტარტის ათვლა ან rally-მთვლელი
  const nowMs = performance.now();
  const counting = running && nowMs < countdownUntil;
  if (counting) {
    const rem = countdownUntil - nowMs;
    const num = rem > 1733 ? 3 : rem > 866 ? 2 : 1;
    drawCenterNumber(num, 170, accent(0.85));
  } else if (running && rally > 0) {
    const pop = 1 + Math.max(0, rallyPop) * 0.25;
    drawCenterNumber(rally, 150 * pop, accent(0.16 + glow * 0.12));
  }

  // ანგარიში — duo-ში თითო მოთამაშის მხარესთან (ზედა 180°)
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '600 40px sans-serif';
  ctx.textBaseline = 'alphabetic';
  if (mode === 'duo') {
    ctx.textAlign = 'center';
    ctx.fillText(scoreP, 44, H - 70);                 // ქვედა მოთამაშე
    ctx.save(); ctx.translate(W - 44, 70); ctx.rotate(Math.PI);
    ctx.fillText(scoreA, 0, 0); ctx.restore();        // ზედა მოთამაშე (180°)
  } else {
    ctx.textAlign = 'left';
    ctx.fillText(scoreA, 18, H/2 - 24);
    ctx.fillText(scoreP, 18, H/2 + 56);
  }

  // ბურთის კვალი
  for (let i = 0; i < trail.length; i++) {
    const a = (i / trail.length) * 0.5;
    const s = BALL * (0.4 + 0.6 * i / trail.length);
    ctx.fillStyle = accent(a);
    ctx.fillRect(trail[i].x - s/2, trail[i].y - s/2, s, s);
  }

  // რაკეტები (skin-ის ფერი)
  ctx.fillStyle = paddleCol();
  roundRect(pTop.x, pTop.y - PADDLE_H/2, PADDLE_W, PADDLE_H, 7);
  roundRect(pBottom.x, pBottom.y - PADDLE_H/2, PADDLE_W, PADDLE_H, 7);

  // ბურთი — rally-სთან ერთად ანთდება
  ctx.shadowColor = accent(0.9);
  ctx.shadowBlur = 8 + glow * 22;
  ctx.fillStyle = accent(1);
  ctx.fillRect(ball.x - BALL/2, ball.y - BALL/2, BALL, BALL);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.fill();
}

// ================= ონლაინ (PeerJS, P2P — backend-ის გარეშე) =================
// host = ქვედა რაკეტი (ავტორიტეტული ფიზიკა), guest = ზედა რაკეტი
const lobbyEl = document.getElementById('lobby');
const lobbyHome = document.getElementById('lobbyHome');
const lobbyWait = document.getElementById('lobbyWait');
const lobbyErrEl = document.getElementById('lobbyErr');
const roomCodeEl = document.getElementById('roomCode');
const lobbyStatus = document.getElementById('lobbyStatus');

function genCode() {
  const s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = ''; for (let i = 0; i < 4; i++) c += s[Math.floor(Math.random() * s.length)];
  return c;
}
function openLobby() {
  lobbyErrEl.textContent = '';
  lobbyHome.classList.remove('hidden');
  lobbyWait.classList.add('hidden');
  lobbyEl.classList.remove('hidden');
}
function closeLobby() { lobbyEl.classList.add('hidden'); }
function lobbyError(msg) {
  lobbyErrEl.textContent = '⚠️ ' + msg;
  lobbyHome.classList.remove('hidden');
  lobbyWait.classList.add('hidden');
}
if (typeof Peer === 'undefined') {
  document.getElementById('onlineBtn').style.display = 'none'; // PeerJS ვერ ჩაიტვირთა
}
document.getElementById('onlineBtn').addEventListener('click', () => { initAudio(); openLobby(); });
document.getElementById('lobbyClose').addEventListener('click', () => { endOnline(); closeLobby(); });

document.getElementById('createRoomBtn').addEventListener('click', startHost);
document.getElementById('joinRoomBtn').addEventListener('click', () => {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (code.length >= 3) startJoin(code);
});
document.getElementById('copyCodeBtn').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(roomCodeEl.textContent); } catch (e) {}
});

function startHost() {
  if (typeof Peer === 'undefined') return lobbyError('ონლაინ მოდული მიუწვდომელია');
  const code = genCode();
  const peer = new Peer('tenisi-' + code, { debug: 0 });
  online = { role: 'host', peer, conn: null, connected: false, oppTarget: W/2 - PADDLE_W/2, code };
  peer.on('open', () => {
    roomCodeEl.textContent = code;
    lobbyHome.classList.add('hidden');
    lobbyWait.classList.remove('hidden');
    lobbyStatus.textContent = '⏳ ველოდები მეგობარს…';
  });
  peer.on('connection', c => {
    online.conn = c;
    c.on('open', () => { setupConn(c); beginOnlineGame(); });
  });
  peer.on('error', e => { online = null; lobbyError('ვერ შეიქმნა ოთახი (' + e.type + ')'); });
}
function startJoin(code) {
  if (typeof Peer === 'undefined') return lobbyError('ონლაინ მოდული მიუწვდომელია');
  const peer = new Peer(undefined, { debug: 0 });
  online = { role: 'guest', peer, conn: null, connected: false, lastState: null };
  lobbyStatus.textContent = '⏳ ვუკავშირდები…';
  lobbyHome.classList.add('hidden'); lobbyWait.classList.remove('hidden');
  roomCodeEl.textContent = code;
  peer.on('open', () => {
    const c = peer.connect('tenisi-' + code, { reliable: false });
    online.conn = c;
    c.on('open', () => { setupConn(c); beginOnlineGuest(); });
    setTimeout(() => { if (online && !online.connected) { endOnline(); lobbyError('ოთახი ვერ მოიძებნა'); } }, 9000);
  });
  peer.on('error', e => { endOnline(); lobbyError(e.type === 'peer-unavailable' ? 'ასეთი ოთახი არ არსებობს' : 'შეცდომა (' + e.type + ')'); });
}
function setupConn(c) {
  c.on('data', onNetData);
  c.on('close', onNetClose);
  c.on('error', () => {});
}
function beginOnlineGame() { // host
  online.connected = true; closeLobby();
  mode = 'cpu'; // ლეიაუტისთვის (AI გამორთულია online-ის გამო)
  startGame();
}
function beginOnlineGuest() {
  online.connected = true; closeLobby();
  mode = 'cpu';
  overlay.classList.add('hidden');
  running = false; // პირველ state-მდე
}
function onNetData(d) {
  if (!online) return;
  if (online.role === 'host') {
    if (d && d.t === 'i') online.oppTarget = d.x;
  } else {
    if (d && d.t === 's') { online.lastState = d; applyState(d); }
  }
}
function applyState(st) { // guest — host-ის ავტორიტეტული მდგომარეობა (pTop ლოკალურია)
  ball.x = st.b[0]; ball.y = st.b[1];
  pBottom.x = st.bot;
  scoreP = st.sp; scoreA = st.sa;
  rally = st.rl;
  countdownUntil = st.cd > 0 ? performance.now() + st.cd : 0;
  const wasRunning = running;
  running = st.run;
  if (!st.run && wasRunning && !online.overShown) { online.overShown = true; showOnlineOver(st.sp, st.sa); }
}
function showOnlineOver(sp, sa) { // guest = ზედა მხარე
  const won = sa > sp;
  overlay.querySelector('h1').textContent = won ? 'შენ მოიგე! 🏆' : 'წააგე';
  subtitleEl.textContent = `ანგარიში ${sa} : ${sp}`;
  startBtn.textContent = 'მენიუ';
  overlay.classList.remove('hidden');
  setTimeout(endOnline, 400);
}
function onNetClose() {
  if (!online) return;
  if (!online.overShown && running) {
    overlay.querySelector('h1').textContent = 'კავშირი გაწყდა';
    subtitleEl.textContent = 'მეგობარი გავიდა';
    overlay.classList.remove('hidden');
  }
  endOnline();
}
function endOnline() {
  if (!online) return;
  try { online.conn && online.conn.close(); } catch (e) {}
  try { online.peer && online.peer.destroy(); } catch (e) {}
  online = null;
  running = false;
}
function netSendState() {
  const c = online.conn; if (!c || !c.open) return;
  const cd = Math.max(0, countdownUntil - performance.now());
  try { c.send({ t: 's', b: [Math.round(ball.x), Math.round(ball.y)], bot: Math.round(pBottom.x), sp: scoreP, sa: scoreA, cd: Math.round(cd), rl: rally, run: running }); } catch (e) {}
}
function netSendInput() {
  const c = online.conn; if (!c || !c.open) return;
  try { c.send({ t: 'i', x: Math.round(pTop.target) }); } catch (e) {}
}

// ---- ციკლი ----
function loop() {
  if (online && online.connected) {
    if (online.role === 'host') {
      if (running) { if (online.oppTarget != null) pTop.target = online.oppTarget; update(); }
      netSendState();
      if (!running && online.overShown !== 'done' && online.endAt && performance.now() > online.endAt) { online.overShown = 'done'; endOnline(); }
      if (!running && !online.endAt) online.endAt = performance.now() + 1200; // over-ის შემდეგ ცოტა ხანში teardown
    } else { // guest
      pTop.target = Math.max(0, Math.min(W - PADDLE_W, pTop.target));
      pTop.x += (pTop.target - pTop.x) * 0.35;
      netSendInput();
    }
    draw();
  } else {
    if (running) update();
    draw();
  }
  requestAnimationFrame(loop);
}
loop();

// ---- PWA: service worker-ის რეგისტრაცია ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
